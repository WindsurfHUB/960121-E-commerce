<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Register - Nordic Shop: Tailwind Toolbox</title>
    <meta name="description" content="Free open source Tailwind CSS Store template" />
    <meta name="keywords" content="tailwind,tailwindcss,tailwind css,css,starter template,free template,store template, shop layout, minimal, monochrome, minimalistic, theme, nordic" />

    <link rel="stylesheet" href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" />
    <link href="https://fonts.googleapis.com/css?family=Work+Sans:200,400&display=swap" rel="stylesheet" />

    <style>
      .work-sans {
        font-family: "Work Sans", sans-serif;
      }
      #menu-toggle:checked + #menu {
        display: block;
      }
    </style>
  </head>

  <body class="bg-white text-gray-600 work-sans leading-normal text-base tracking-normal">
    
    <nav id="header" class="w-full z-30 top-0 py-1 border-b border-gray-200">
      <div class="w-full container mx-auto flex flex-wrap items-center justify-between mt-0 px-6 py-3">
        <label for="menu-toggle" class="cursor-pointer md:hidden block">
          <svg class="fill-current text-gray-900" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
            <title>menu</title>
            <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z"></path>
          </svg>
        </label>
        <input class="hidden" type="checkbox" id="menu-toggle" />

        <div class="hidden md:flex md:items-center md:w-auto w-full order-3 md:order-1" id="menu">
          <nav>
            <ul class="md:flex items-center justify-between text-base text-gray-700 pt-4 md:pt-0">
              <li><a class="inline-block no-underline hover:text-black hover:underline py-2 px-4" href="shop.html">Shop</a></li>
              <li><a class="inline-block no-underline hover:text-black hover:underline py-2 px-4" href="index.html#about">About</a></li>
            </ul>
          </nav>
        </div>

        <div class="order-1 md:order-2">
          <a class="flex items-center tracking-wide no-underline hover:no-underline font-bold text-gray-800 text-xl" href="index.html">
            <svg class="fill-current text-gray-800 mr-2" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
              <path d="M5,22h14c1.103,0,2-0.897,2-2V9c0-0.553-0.447-1-1-1h-3V7c0-2.757-2.243-5-5-5S7,4.243,7,7v1H4C3.447,8,3,8.447,3,9v11 C3,21.103,3.897,22,5,22z M9,7c0-1.654,1.346-3,3-3s3,1.346,3,3v1H9V7z M5,10h2v2h2v-2h6v2h2v-2h2l0.002,10H5V10z" />
            </svg>
            NORDICS
          </a>
        </div>
      </div>
    </nav>

    <section class="bg-white py-8 flex items-center justify-center min-h-[calc(100vh-200px)] mt-10">
      <div class="container mx-auto px-6 max-w-md">
        <div class="bg-gray-50 p-8 rounded-lg shadow-sm border border-gray-100">
          <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Create Account</h1>
          
          <form id="register-form" class="space-y-6">
            <div>
              <label for="reg-firstname" class="block text-gray-700 font-semibold mb-2">First Name</label>
              <input type="text" id="reg-firstname" class="w-full border border-gray-300 px-4 py-3 rounded focus:outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-500 transition-colors" placeholder="John" required />
            </div>

            <div>
              <label for="reg-email" class="block text-gray-700 font-semibold mb-2">Email Address</label>
              <input type="email" id="reg-email" class="w-full border border-gray-300 px-4 py-3 rounded focus:outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-500 transition-colors" placeholder="you@example.com" required />
            </div>
            
            <div>
              <label for="reg-password" class="block text-gray-700 font-semibold mb-2">Password</label>
              <input type="password" id="reg-password" class="w-full border border-gray-300 px-4 py-3 rounded focus:outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-500 transition-colors" placeholder="••••••••" required />
              <p class="text-xs text-gray-500 mt-2">Must be at least 8 characters, with 1 uppercase and 1 special character.</p>
            </div>

            <div id="reg-message" class="hidden p-3 rounded text-sm text-center font-semibold"></div>

            <button type="submit" id="register-btn" class="w-full bg-gray-800 text-white py-3 rounded hover:bg-gray-900 font-semibold transition-colors flex justify-center items-center">
              Register
            </button>
          </form>

          <p class="text-center text-gray-600 mt-6">
            Already have an account? <a href="login.html" class="text-gray-900 font-semibold hover:underline">Sign in</a>
          </p>
        </div>
      </div>
    </section>

    <script>
      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const firstName = document.getElementById('reg-firstname').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const submitBtn = document.getElementById('register-btn');
        const msgBox = document.getElementById('reg-message');

        // 1. Frontend Validation
        const passwordRegex = /^(?=.*[A-Z])(?=.*[!@#$&*]).{8,}$/;
        if (!passwordRegex.test(password)) {
            msgBox.textContent = "Password needs 8 chars, 1 uppercase, 1 special character.";
            msgBox.classList.remove('hidden');
            msgBox.classList.add('bg-red-100', 'text-red-700');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Creating Account...';

        try {
          // 2. Send Data to the Registration Route
          const response = await fetch('http://localhost:8888/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ firstName, email, password })
          });

          const data = await response.json();

          // Reset message box styling
          msgBox.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');

          if (response.ok) {
            // Success: Display message and redirect to login
            msgBox.textContent = 'Account created successfully! Redirecting to login...';
            msgBox.classList.add('bg-green-100', 'text-green-700');
            
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 2000);

          } else {
            // Failure: Display the backend error message (e.g., email already exists)
            msgBox.textContent = data.message || 'Registration failed';
            msgBox.classList.add('bg-red-100', 'text-red-700');
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Register';
          }
        } catch (error) {
          console.error('Network error:', error);
          msgBox.textContent = 'Failed to connect to the server. Is it running?';
          msgBox.classList.add('bg-red-100', 'text-red-700');
          msgBox.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Register';
        }
      });
    </script>
  </body>
</html>
